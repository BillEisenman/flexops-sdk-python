name: Publish to PyPI

# Publishes flexops to pypi.org via PyPI trusted publishing (OIDC) — no
# stored token, no MFA prompt. Triggered on vX.Y.Z tag push or manual
# workflow_dispatch.
#
# One-time setup on pypi.org (required before the first run):
#   1. Log in to pypi.org → project "flexops" → Publishing → Trusted Publishers
#      → Add a new publisher
#   2. Fill in:
#        Publisher:  GitHub
#        Owner:      BillEisenman
#        Repository: flexops-sdk-python
#        Workflow:   publish.yml
#        Environment: (leave blank)
#
# If the project doesn't exist on PyPI yet, register a pending trusted
# publisher first, then the first workflow run will create the project.
#
# Docs: https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required to mint the OIDC token GitHub → PyPI exchanges

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution with twine
        run: twine check dist/*

      - name: Publish (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No PYPI_API_TOKEN. The official action detects the GitHub OIDC
        # context and exchanges it for a short-lived PyPI upload token.
